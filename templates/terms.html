<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользовательское соглашение | Моя Ферма</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container" style="padding: 40px 20px; max-width: 900px; margin: 0 auto;">
        <div class="card">
            <h1 style="margin-bottom: 10px;"><i class="fas fa-file-contract"></i> Пользовательское соглашение</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Последнее обновление: 17 апреля 2026 г.</p>
            
            <!-- Содержимое соглашения такое же, как в модальном окне выше -->
            <!-- Можно скопировать текст из модального окна -->
            
            <hr>
            <div style="margin-top: 30px;">
                <a href="{{ url_for('auth.register') }}" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i> Вернуться к регистрации
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Загрузка темы
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
