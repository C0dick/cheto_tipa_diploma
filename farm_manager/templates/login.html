<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Моя Ферма</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #9ca3af;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: var(--primary);
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 48px; color: var(--primary); margin-bottom: 10px;">
                <i class="fas fa-tractor"></i>
            </div>
            <h1 style="color: var(--primary-dark); margin-bottom: 8px; font-size: 2rem;">Моя Ферма</h1>
            <p class="subtitle" style="color: var(--text-muted);">Войдите в свой аккаунт</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" style="margin-bottom: 20px;">
                        <i class="fas fa-{% if category == 'success' %}check-circle{% elif category == 'danger' %}exclamation-circle{% else %}info-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Имя пользователя</label>
                <input type="text" name="username" placeholder="Введите имя пользователя" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Пароль</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <i class="fas fa-eye toggle-password" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Запомнить меня
                </label>
                <a href="#" class="forgot-link" onclick="showResetHint()">
                    <i class="fas fa-question-circle"></i> Забыли пароль?
                </a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a></p>
        </div>
        
        <!-- Демо-доступ -->
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e7eb;">
            <p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-bottom: 10px;">
                <i class="fas fa-info-circle"></i> Демо-доступ
            </p>
            <button type="button" class="btn btn-sm" style="width: 100%;" onclick="fillDemo()">
                <i class="fas fa-user-check"></i> Заполнить демо-данные
            </button>
        </div>
    </div>
</div>

<script>
function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('togglePassword');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}

function showResetHint() {
    alert('Для восстановления пароля обратитесь к администратору фермы.\n\nДемо-доступ: можно зарегистрировать новый аккаунт.');
}

function fillDemo() {
    document.querySelector('input[name="username"]').value = 'demo123';
    document.querySelector('input[name="password"]').value = 'demo123';
}
</script>
</body>
</html>
